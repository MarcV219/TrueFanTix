<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TrueFanTix — Coming Soon</title>
    <meta name="description" content="TrueFanTix is coming soon." />
    <style>
      :root {
        color-scheme: light;
        --bg: #0b0d12;
        --fg: #e7eaf0;
        --muted: #a6adbb;
        --card: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --accent: #7c5cff;
      }
      html, body {
        height: 100%;
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: radial-gradient(1200px circle at 20% 10%, rgba(124, 92, 255, 0.25), transparent 50%),
          radial-gradient(900px circle at 80% 30%, rgba(0, 200, 255, 0.18), transparent 55%),
          var(--bg);
        color: var(--fg);
      }
      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }
      .card {
        max-width: 760px;
        width: 100%;
        padding: 40px 28px;
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.55;
        font-size: 16px;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.2);
        color: var(--fg);
        margin-bottom: 14px;
      }
      .footer {
        margin-top: 18px;
        font-size: 12px;
        color: rgba(231, 234, 240, 0.6);
      }
      a {
        color: var(--fg);
        text-decoration: none;
        border-bottom: 1px dotted rgba(231, 234, 240, 0.45);
      }
      a:hover {
        border-bottom-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" role="region" aria-label="TrueFanTix Coming Soon">
        <div class="badge">TrueFanTix</div>
        <h1>Coming Soon</h1>
        <p>
          We’re building a better way to buy and sell tickets.
          This site is currently in development.
        </p>
        <p>
          If you’re part of the team, use the protected dev URL.
        </p>
        <div class="footer">
          © <span id="y"></span> TrueFanTix
        </div>
      </section>
    </main>
    <script>
      document.getElementById('y').textContent = String(new Date().getFullYear());
    </script>
  </body>
</html>
